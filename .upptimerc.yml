# Change these first
owner: Springbok-LLC # Your GitHub organization or username, where this repository lives
repo: nlm-ckn-ui-uptime # The name of this repository

sites:
  # ── dev (https://dev.nlm-ckn.org) ───────────────────────────────────────────
  - name: Dev Frontend
    url: https://dev.nlm-ckn.org/
  - name: Dev Backend Version Endpoint
    url: https://dev.nlm-ckn.org/arango_api/version/
  - name: Dev Arango Collections Endpoint
    url: https://dev.nlm-ckn.org/arango_api/collections/
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"graph":"ontologies"}'

  # ── stage (https://stage.nlm-ckn.org) ───────────────────────────────────────
  - name: Stage Frontend
    url: https://stage.nlm-ckn.org/
  - name: Stage Backend Version Endpoint
    url: https://stage.nlm-ckn.org/arango_api/version/
  - name: Stage Arango Collections Endpoint
    url: https://stage.nlm-ckn.org/arango_api/collections/
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"graph":"ontologies"}'

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /upptime
  logoUrl: https://avatars.githubusercontent.com/u/278495905?s=48&v=4
  name: Upptime
  introTitle: "**Upptime** is the open-source uptime monitor and status page, powered entirely by GitHub."
  introMessage: This is a status page for the NLM CKN backend and frontend deployed from https://github.com/Springbok-LLC/nlm-ckn-ui
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
